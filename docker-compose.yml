services:
  backend:
    build:
      context: ./backend
    environment:
      LLM_PROVIDER: mock
      DATABASE_URL: sqlite:////app/data/chatbot.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  backend-data:
